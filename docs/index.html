  <div id="app" class="layout">
    <div id="left" class="left chat">
      <div id="chatHeader" class="chatHeader">
        <div id="meBar">Площадь</div>
        <div class="pill" id="locPill">Локация: Площадь</div>
      </div>

      <div id="chatLog" class="chatLog"></div>

      <div id="chatInputRow" class="chatInputRow">
        <input id="chatInput" class="input" placeholder="Пиши по теме." />
        <button id="btnSend" class="btn">Заслать</button>
      </div>

      <div id="chatResizeHandle" class="chatResizeHandle" role="separator" aria-label="Изменить высоту чата" aria-orientation="horizontal" tabindex="0"></div>
    </div>

    <div id="right" class="right">
      <div id="topBar" class="topbar">
        <div id="balance" aria-label="Профиль">
          <span class="statChip" data-profile-stat="influence"><span class="statIcon" title="Влияние">⚡</span><span id="meInfluence" class="statValue">0</span></span>

          <span class="statChip pointsWrap" data-profile-stat="points"><span class="pointsRow"><span class="statIcon" title="💰">💰</span><span id="mePoints" class="pointsValue statValue">0</span><span id="mePointsOverflow" class="pointsOverflow"></span></span><span id="pointsCapNote" class="pointsNote"></span></span>
          <span class="statChip" data-profile-stat="wins"><span class="statIcon" title="Победы">🏆</span><span id="meWins" class="statValue">0</span></span>
        </div>
        <div id="weeklyCapLine" class="capLine"></div>
        <button id="btnMenu" class="btn">Меню</button>
      </div>

      <div id="blocks">
        <div class="block panel hidden" id="menuBlock">
          <div class="blockHeader panelHeader">
            <div>Меню</div>
            <div class="righty"></div>
          </div>
          <div class="blockBody panelBody" id="menuBody">
          </div>
        </div>

        <div class="block panel hidden" id="dmBlock">
          <div class="blockHeader panelHeader" id="dmBlockHeader">
            <div>
              <span class="headerTitleText">Личка</span>
              <span class="headerCountWrapper" id="dmHeaderCount"></span>
            </div>
            <div class="righty"></div>
          </div>
          <div class="blockBody panelBody">
            <div id="dmHeader">
            <div id="dmTitle">Личка</div>
            </div>

            <div id="dmLog"></div>

            <div id="dmActions"></div>

            <div id="teachPanel" class="hidden"></div>

            <div id="dmInputRow">
              <input id="dmInput" class="input" placeholder="Пиши в личку." />
              <button id="dmSend" class="btn">Заслать</button>
            </div>

            <div id="dmExtraRow" class="hidden" style="margin-top:10px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
              <input id="reportInput" class="input" placeholder="Ник бандита или токсика." style="flex:1; min-width:220px;"/>
              <button id="reportBtn" class="btn">Сдать</button>
              <span class="pill" id="reportHint">Сдай токсика, бандита или мафиози.</span>
            </div>

          </div>
        </div>

        <div class="block panel" id="battlesBlock">
          <div class="blockHeader panelHeader" id="battlesHeader">
            <div>
              <span class="battleTitleText">баттл</span>
              <span id="battleCountWrapper">(<span id="battleCount">0</span>)</span>
            </div>
            <div class="righty"></div>
          </div>
          <div class="blockBody panelBody scroll hidden" id="battlesBody"></div>
        </div>

        <div class="block panel" id="eventsBlock">
          <div class="blockHeader panelHeader" id="eventsHeader">
            <div class="eventsTitle">
              <span class="headerTitleText">События</span>
              <span class="headerCountWrapper" id="eventsHeaderCount"></span>
            </div>
            <div class="righty"></div>
          </div>
          <div class="blockBody panelBody scroll hidden" id="eventsBody"></div>
        </div>

      </div>
    </div>
  </div>

  <div id="startScreen">
    <div id="startCard">
      <h1 id="startTitle"></h1>
      <div id="startIntroLines"></div>
      <div id="startEconomyHonestyLine"></div>
      <label id="startBirthYearLabel" class="startFieldLabel">Последние 2 цифры года рождения</label>
      <div id="startBirthYearPicker" class="startBirthYearPicker" aria-label="Последние 2 цифры года рождения">
        <div class="startBirthYearWheel" data-birth-year-digit="0">
          <button id="startBirthYear0Up" class="startBirthYearArrow" type="button" data-birth-year-step="1" data-birth-year-index="0" aria-label="Увеличить первую цифру">▲</button>
          <div id="startBirthYearDigit0" class="startBirthYearDigit" aria-live="polite">0</div>
          <button id="startBirthYear0Down" class="startBirthYearArrow" type="button" data-birth-year-step="-1" data-birth-year-index="0" aria-label="Уменьшить первую цифру">▼</button>
        </div>
        <div class="startBirthYearWheel" data-birth-year-digit="1">
          <button id="startBirthYear1Up" class="startBirthYearArrow" type="button" data-birth-year-step="1" data-birth-year-index="1" aria-label="Увеличить вторую цифру">▲</button>
          <div id="startBirthYearDigit1" class="startBirthYearDigit" aria-live="polite">0</div>
          <button id="startBirthYear1Down" class="startBirthYearArrow" type="button" data-birth-year-step="-1" data-birth-year-index="1" aria-label="Уменьшить вторую цифру">▼</button>
        </div>
      </div>
      <div id="startBirthYearHint" class="startFieldHint">Только для интерфейса. Не сохраняем. Можно поменять позже.</div>
      <label id="startBirthYearFeelingLabel" class="startFieldLabel">я на самом деле чувствую будто я родился в …</label>
      <input id="startBirthYearFeelingInput" class="input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" pattern="-?[0-9]*" />
      <div id="startBtns">
        <button id="btnStart" class="btn primary"></button>
        <button id="btnRules" class="btn"></button>
      </div>
    </div>
