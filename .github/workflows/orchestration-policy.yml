name: orchestration-policy

on:
  push:
    paths:
      - AGENTS.md
      - AGENTS.override.md
      - PROCESS_ROOT_SYNC.md
      - ORCHESTRATION.md
      - BRIDGE.md
      - CODEX_BRIDGE_BOOTSTRAP.md
      - CODEX_BRIDGE_RECOVERY.md
      - GIT_PULL.md
      - GIT_PUSH.md
      - STAGE6_PARALLEL_EXECUTION_PLAN.md
      - tools/validate-orchestration-policy.py
      - tools/closed_loop_contract.py
      - tools/test_closed_loop_contract.py
      - .github/workflows/orchestration-policy.yml
      - plugins/asynchronia/.codex-plugin/plugin.json
      - CLOSED_LOOP_PROTOCOL.md
      - plugins/asynchronia/skills/**/*.md
  pull_request:
    paths:
      - AGENTS.md
      - AGENTS.override.md
      - PROCESS_ROOT_SYNC.md
      - ORCHESTRATION.md
      - BRIDGE.md
      - CODEX_BRIDGE_BOOTSTRAP.md
      - CODEX_BRIDGE_RECOVERY.md
      - GIT_PULL.md
      - GIT_PUSH.md
      - STAGE6_PARALLEL_EXECUTION_PLAN.md
      - tools/validate-orchestration-policy.py
      - tools/closed_loop_contract.py
      - tools/test_closed_loop_contract.py
      - .github/workflows/orchestration-policy.yml
      - plugins/asynchronia/.codex-plugin/plugin.json
      - CLOSED_LOOP_PROTOCOL.md
      - plugins/asynchronia/skills/**/*.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile closed-loop policy scripts
        run: python3 -m py_compile tools/closed_loop_contract.py tools/test_closed_loop_contract.py tools/validate-orchestration-policy.py
      - name: Run closed-loop contract unit tests
        run: python3 -m unittest tools.test_closed_loop_contract
      - name: Determine historical validator applicability
        id: applicability
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
          else
            BASE=""
          fi

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED="$(git diff --name-only "$BASE"...HEAD)"
          printf '%s\n' "$CHANGED"

          if printf '%s\n' "$CHANGED" | grep -Eq '^(tools/closed_loop_contract.py|tools/test_closed_loop_contract.py|tools/validate-orchestration-policy.py|CLOSED_LOOP_PROTOCOL.md)$'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate historical Bridge 062 orchestration policy
        if: steps.applicability.outputs.run == 'true'
        run: python3 tools/validate-orchestration-policy.py
      - name: Record historical validator not applicable
        if: steps.applicability.outputs.run != 'true'
        run: echo "NOT_APPLICABLE_HISTORICAL_BRIDGE_062_SCOPE"
