name: Asynchronia automatic model preflight

on:
  pull_request:
    paths:
      - "AGENTS.override.md"
      - "plugins/asynchronia/**"
      - "tools/validate-asynchronia-auto-model-preflight.py"
      - ".github/workflows/asynchronia-auto-model-preflight.yml"
  push:
    branches:
      - main
    paths:
      - "AGENTS.override.md"
      - "plugins/asynchronia/**"
      - "tools/validate-asynchronia-auto-model-preflight.py"
      - ".github/workflows/asynchronia-auto-model-preflight.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate automatic plugin and model preflight contract
        run: python3 tools/validate-asynchronia-auto-model-preflight.py
