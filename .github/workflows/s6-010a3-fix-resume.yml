name: Fix S6-010A3 resume mode
on:
  pull_request:
    branches: [chatgpt/s6-010a3-helper-base-20260706]
    types: [opened, synchronize, reopened]
permissions:
  contents: write
jobs:
  fix:
    if: github.head_ref == 'chatgpt/s6-010a3-restore-change-later-20260706'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chatgpt/s6-010a3-restore-change-later-20260706
          fetch-depth: 0
      - name: Fix docs declaration
        run: |
          python3 -c "from pathlib import Path; p=Path('docs/ui/ui-boot.js'); s=p.read_text(); a='      birthYearPicker.dataset.bound = \\\"1\\\";\n    }\n\n    const startBtn = $(\\\"btnStart\\\") || document.getElementById(\\\"btnStart\\\");'; b='      birthYearPicker.dataset.bound = \\\"1\\\";\n    }\n\n    const resumeMode = getOnboardingSeen(UI);\n    const startBtn = $(\\\"btnStart\\\") || document.getElementById(\\\"btnStart\\\");'; assert s.count(a)==1; p.write_text(s.replace(a,b,1))"
          node --check AsyncScene/Web/ui/ui-boot.js
          node --check docs/ui/ui-boot.js
          grep -q 'const resumeMode = getOnboardingSeen(UI);' docs/ui/ui-boot.js
          git diff --check
      - name: Commit
        run: |
          git config user.name ChatGPT
          git config user.email chatgpt@users.noreply.github.com
          git add docs/ui/ui-boot.js
          git commit -m 'Fix S6-010A3 docs resume mode'
          git push origin HEAD:refs/heads/chatgpt/s6-010a3-restore-change-later-20260706
